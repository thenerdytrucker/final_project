experiment:
  name: pima_diabetes_sprint17
  tracking_uri: sqlite:///mlflow.db

data:
  source: kagglehub_pima_diabetes
  test_size: 0.2
  random_state: 42

features:
  numeric:
    - Glucose
    - BloodPressure
    - BMI
    - Age

training:
  model_type: logistic_regression
  logistic_regression:
    max_iter: 2000
    C: 1.0
    class_weight: null
  run_configs:
    - run_name: logreg_default
      model_type: logistic_regression
      params:
        max_iter: 2000
        C: 1.0
        class_weight: null
    - run_name: logreg_balanced_c03
      model_type: logistic_regression
      params:
        max_iter: 2000
        C: 0.3
        class_weight: balanced
    - run_name: rf_200_default
      model_type: random_forest
      params:
        n_estimators: 200
        min_samples_leaf: 1
    - run_name: rf_400_depth8
      model_type: random_forest
      params:
        n_estimators: 400
        max_depth: 8
        min_samples_leaf: 2
    - run_name: gb_200_lr01_depth3
      model_type: gradient_boosting
      params:
        n_estimators: 200
        learning_rate: 0.1
        max_depth: 3

thresholds:
  min_accuracy: 0.9
  min_auc: 0.95
