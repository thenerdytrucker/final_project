experiment:
  name: pima_diabetes_sprint17
  tracking_uri: sqlite:///mlflow.db

data:
  source: sklearn_breast_cancer
  test_size: 0.2
  random_state: 42

features:
  numeric:
    - mean radius
    - mean texture
    - mean perimeter
    - mean area
    - mean smoothness
    - mean compactness
    - mean concavity
    - mean concave points
    - mean symmetry
    - mean fractal dimension

training:
  model_type: logistic_regression
  logistic_regression:
    max_iter: 2000
    C: 1.0
    class_weight: null

thresholds:
  min_accuracy: 0.9
  min_auc: 0.95
