experiment:
  name: pima_diabetes_sprint17
  tracking_uri: sqlite:///mlflow.db

data:
  source: kagglehub_pima_diabetes
  test_size: 0.2
  random_state: 42

features:
  numeric:
    - Glucose
    - BloodPressure
    - BMI
    - Age

training:
  model_type: logistic_regression
  logistic_regression:
    max_iter: 2000
    C: 1.0
    class_weight: null

thresholds:
  min_accuracy: 0.9
  min_auc: 0.95
